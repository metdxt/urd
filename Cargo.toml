cargo-features = ["profile-rustflags"]

[package]
name = "urd"
version = "0.0.1"
edition = "2024"
description = "a lang [very WIP]"
license = "MIT"
repository = "https://github.com/metdxt/urd"

[dependencies]
ariadne = "0.6.0"
chumsky = { version="0.11.2", features=[ "pratt" ] }
logos = "0.15.1"
logos-display = "0.1.3"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0.17"
log = "0.4"

[profile.dev]
incremental=true

[profile.test]
opt-level=1
incremental=true
debug = 0
codegen-units = 256
rustflags = ["-Z", "codegen-backend=cranelift"]

[profile.test.build-override]
opt-level = 0
codegen-units = 256
debug = false

[lints]
clippy.unwrap_used = "deny"
clippy.expect_used = "deny"
rust.missing_docs = "warn"
