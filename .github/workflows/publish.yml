name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate without publishing)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-urd-derive:
    name: Publish urd-derive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Determine dry-run flag
        id: flags
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish urd-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          flags="--quiet --allow-dirty"
          if [[ "${{ steps.flags.outputs.dry_run }}" == "true" ]]; then
            flags="$flags --dry-run"
          fi
          cargo publish -p urd-derive $flags

      - name: Wait for crates.io index
        if: steps.flags.outputs.dry_run != 'true'
        run: sleep 60

  publish-urd:
    name: Publish urd
    needs: publish-urd-derive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Determine dry-run flag
        id: flags
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish urd
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          flags="--quiet --allow-dirty"
          if [[ "${{ steps.flags.outputs.dry_run }}" == "true" ]]; then
            flags="$flags --dry-run"
          fi
          cargo publish -p urd $flags

      - name: Wait for crates.io index
        if: steps.flags.outputs.dry_run != 'true'
        run: sleep 60

  publish-downstream:
    name: Publish ${{ matrix.crate }}
    needs: publish-urd
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [urd-lsp, urd-quest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Determine dry-run flag
        id: flags
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish ${{ matrix.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          flags="--quiet --allow-dirty"
          if [[ "${{ steps.flags.outputs.dry_run }}" == "true" ]]; then
            flags="$flags --dry-run"
          fi
          cargo publish -p ${{ matrix.crate }} $flags
